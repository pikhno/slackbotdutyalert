services:
  - type: web
    name: slack-oncall-bot
    env: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:flask_app --bind 0.0.0.0:$PORT
    envVars:
      - key: SLACK_BOT_TOKEN
        sync: false
      - key: SLACK_SIGNING_SECRET
        sync: false
      - key: SLACK_CHANNEL_ID
        sync: false
      - key: GIST_ID
        sync: false
      - key: GIST_TOKEN
        sync: false
      - key: ALERT_PATTERNS
        value: "FIRING,CRITICAL,ALERT"
