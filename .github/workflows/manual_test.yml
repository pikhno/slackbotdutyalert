name: Manual Test

on:
  workflow_dispatch:
    inputs:
      action:
        description: 'Що запустити'
        required: true
        default: 'show_schedule'
        type: choice
        options:
          - show_schedule
          - announce
      channel_id:
        description: 'Channel ID (порожньо = всі канали)'
        required: false
        default: ''
        type: string

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Show schedule
        if: ${{ inputs.action == 'show_schedule' }}
        run: python scripts/show_schedule.py

      - name: Post to Slack now
        if: ${{ inputs.action == 'announce' }}
        env:
          SLACK_BOT_TOKEN:     ${{ secrets.SLACK_BOT_TOKEN }}
          SLACK_CHANNEL_ID:    ${{ secrets.SLACK_CHANNEL_ID }}
          GIST_ID:             ${{ secrets.GIST_ID }}
          GIST_TOKEN:          ${{ secrets.GIST_TOKEN }}
          GIPHY_API_KEY:       ${{ secrets.GIPHY_API_KEY }}
          OVERRIDE_CHANNEL_ID: ${{ inputs.channel_id }}
        run: python scripts/announce.py
